services:
  mysql:
    image: mysql:8.4
    container_name: bycigar-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: bycigar
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./server-go
    container_name: bycigar-backend
    ports:
      - "3000:3000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: 123456
      DB_NAME: bycigar
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      SERVER_PORT: 3000
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./bycigar-vue
    container_name: bycigar-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
