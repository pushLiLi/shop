  /admin/config/{key}:
    put:
      consumes:
      - application/json
      description: 更新指定的网站配置项
      parameters:
      - description: 配置键名
        in: path
        name: key
        required: true
        type: string
      - description: 配置值
        in: body
        name: input
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.SiteConfig'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 更新网站配置
      tags:
      - admin-config
  /admin/products:
    get:
      consumes:
      - application/json
      description: 获取商品列表，支持分页和筛选
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: limit
        type: integer
      - description: 搜索关键词
        in: query
        name: search
        type: string
      - description: 分类ID
        in: query
        name: categoryId
        type: integer
      - description: 是否推荐
        in: query
        name: featured
        type: string
      - description: 是否上架
        in: query
        name: active
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 获取商品列表(管理端)
      tags:
      - admin-products
    post:
      consumes:
      - application/json
      description: 创建新的商品
      parameters:
      - description: 商品信息
        in: body
        name: input
        required: true
        schema:
