basePath: /api
definitions:
  handlers.CategoryInput:
    properties:
      name:
        type: string
      parentId:
        type: integer
      slug:
        type: string
    type: object
  handlers.ProductInput:
    properties:
      categoryId:
        type: integer
      description:
        type: string
      imageUrl:
        type: string
      images:
        type: string
      isActive:
        type: boolean
      isFeatured:
        type: boolean
      name:
        type: string
      price:
        type: number
      slug:
        type: string
      stock:
        type: integer
    type: object
  models.AddFavoriteInput:
    properties:
      productId:
        type: integer
    required:
    - productId
    type: object
  models.AddToCartInput:
    properties:
      productId:
        type: integer
      quantity:
        type: integer
    required:
    - productId
    type: object
  models.Address:
    properties:
      addressLine1:
        type: string
      addressLine2:
        type: string
      city:
        type: string
      createdAt:
        type: string
      fullName:
        type: string
      id:
        type: integer
      isDefault:
        type: boolean
      phone:
        type: string
      state:
        type: string
      updatedAt:
        type: string
      userId:
        type: integer
      zipCode:
        type: string
    type: object
  models.Banner:
    properties:
      createdAt:
        type: string
      id:
        type: integer
      imageUrl:
        type: string
      isActive:
        type: boolean
      link:
        type: string
      sortOrder:
        type: integer
      title:
        type: string
      updatedAt:
        type: string
    type: object
  models.Category:
    properties:
      children:
        items:
          $ref: '#/definitions/models.Category'
        type: array
      createdAt:
        type: string
      id:
        type: integer
      name:
        type: string
      parent:
        $ref: '#/definitions/models.Category'
      parentId:
        type: integer
      products:
        items:
          $ref: '#/definitions/models.Product'
        type: array
      slug:
        type: string
      updatedAt:
        type: string
    type: object
  models.CreateAddressInput:
    properties:
      addressLine1:
        type: string
      addressLine2:
        type: string
      city:
        type: string
      fullName:
        type: string
      isDefault:
        type: boolean
      phone:
        type: string
      state:
        type: string
      zipCode:
        type: string
    required:
    - addressLine1
    - city
    - fullName
    - phone
    - state
    - zipCode
    type: object
  models.CreateOrderInput:
    properties:
      addressId:
        type: integer
      remark:
        type: string
    required:
    - addressId
    type: object
  models.LoginInput:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  models.Order:
    properties:
      address:
        $ref: '#/definitions/models.Address'
      addressId:
        type: integer
      createdAt:
        type: string
      id:
        type: integer
      items:
        items:
          $ref: '#/definitions/models.OrderItem'
        type: array
      remark:
        type: string
      status:
        type: string
      total:
        type: number
      updatedAt:
        type: string
      userId:
        type: integer
    type: object
  models.OrderItem:
    properties:
      id:
        type: integer
      orderId:
        type: integer
      price:
        type: number
      product:
        $ref: '#/definitions/models.Product'
      productId:
        type: integer
      quantity:
        type: integer
    type: object
  models.Product:
    properties:
      category:
        $ref: '#/definitions/models.Category'
      categoryId:
        type: integer
      createdAt:
        type: string
      description:
        type: string
      id:
        type: integer
      imageUrl:
        type: string
      images:
        type: string
      isActive:
        type: boolean
      isFeatured:
        type: boolean
      name:
        type: string
      price:
        type: number
      slug:
        type: string
      stock:
        type: integer
      updatedAt:
        type: string
    type: object
  models.RegisterInput:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  models.SiteConfig:
    properties:
      configKey:
        type: string
      configValue:
        type: string
      createdAt:
        type: string
      id:
        type: integer
      updatedAt:
        type: string
    type: object
  models.UpdateAddressInput:
    properties:
      addressLine1:
        type: string
      addressLine2:
        type: string
      city:
        type: string
      fullName:
        type: string
      phone:
        type: string
      state:
        type: string
      zipCode:
        type: string
    type: object
  models.UpdateCartInput:
    properties:
      quantity:
        type: integer
    required:
    - quantity
    type: object
  models.UpdateProfileInput:
    properties:
      name:
        type: string
    type: object
host: localhost:3000
info:
  contact:
    email: support@bycigar.com
    name: API Support
  description: BYCIGAR 电商后台 API 接口文档
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: BYCIGAR API
  version: "1.0"
paths:
  /addresses:
    get:
      consumes:
      - application/json
      description: 获取当前用户的收货地址列表
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 获取地址列表
      tags:
      - addresses
    post:
      consumes:
      - application/json
      description: 创建新的收货地址
      parameters:
      - description: 地址信息
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/models.CreateAddressInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 创建地址
      tags:
      - addresses
  /addresses/{id}:
    delete:
      consumes:
      - application/json
      description: 删除指定的收货地址
      parameters:
      - description: 地址ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 删除地址
      tags:
      - addresses
    put:
      consumes:
      - application/json
      description: 更新指定的收货地址
      parameters:
      - description: 地址ID
        in: path
        name: id
        required: true
        type: integer
      - description: 地址信息
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/models.UpdateAddressInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 更新地址
      tags:
      - addresses
  /addresses/{id}/default:
    put:
      consumes:
      - application/json
      description: 将指定地址设为默认收货地址
      parameters:
      - description: 地址ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 设置默认地址
      tags:
      - addresses
  /admin/banners:
    post:
      consumes:
      - application/json
      description: 创建新的轮播图
      parameters:
      - description: 轮播图信息
        in: body
