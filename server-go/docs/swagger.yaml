      - cart
  /cart/{id}:
    delete:
      consumes:
      - application/json
      description: 从购物车中删除指定商品
      parameters:
      - description: 购物车项ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 删除购物车商品
      tags:
      - cart
    put:
      consumes:
      - application/json
      description: 更新购物车中指定商品的数量
      parameters:
      - description: 购物车项ID
        in: path
        name: id
        required: true
        type: integer
      - description: 数量信息
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/models.UpdateCartInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
