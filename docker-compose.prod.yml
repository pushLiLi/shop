services:
  mysql:
    image: mysql:8.4
    container_name: bycigar-mysql
    restart: unless-stopped
    ports: !reset []
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: bycigar-minio
    restart: unless-stopped
    ports: []
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: bycigar-backend:local
    container_name: bycigar-backend
    restart: unless-stopped
    ports: []
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    image: bycigar-vue:latest
    container_name: bycigar-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/log/letsencrypt:/var/log/letsencrypt
      - certbot-webroot:/var/www/certbot
    depends_on:
      - backend

  certbot:
    image: certbot/certbot
    container_name: bycigar-certbot
    restart: unless-stopped
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/log/letsencrypt:/var/log/letsencrypt
      - certbot-webroot:/var/www/certbot
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: "/bin/sh -c 'apk add --no-cache docker-cli >/dev/null 2>&1; trap exit TERM; while :; do certbot renew --webroot --webroot-path /var/www/certbot --deploy-hook \"docker exec bycigar-frontend nginx -s reload\"; sleep 12h & wait $${!}; done;'"

volumes:
  mysql_data:
  minio_data:
  certbot-webroot:
