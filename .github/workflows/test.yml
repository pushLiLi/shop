name: Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: "123456"
          MYSQL_DATABASE: bycigar_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      minio:
        image: minio/minio
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin123
        ports:
          - 9000:9000
        options: server /data

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Go Test
        working-directory: server-go
        env:
          DB_HOST: "127.0.0.1"
          DB_PORT: "3306"
          DB_USER: root
          DB_PASSWORD: "123456"
          DB_NAME: bycigar_test
          JWT_SECRET: test-jwt-secret-key
          SERVER_PORT: "3000"
          MINIO_ENDPOINT: "127.0.0.1:9000"
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin123
          MINIO_BUCKET: bycigar
          MINIO_USE_SSL: "false"
        run: go test ./... -v -count=1

  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: bycigar-vue/package.json

      - name: Install dependencies
        working-directory: bycigar-vue
        run: npm ci

      - name: Build check
        working-directory: bycigar-vue
        run: npm run build

      - name: Vitest
        working-directory: bycigar-vue
        run: npx vitest run
